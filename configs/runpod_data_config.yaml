# RunPod data configuration for E5 audio-token training.
data:
  dataset: "slakh2100"
  data_root: "dataset/audio_subset"
  sample_rate: 24000
  clip_duration: 10.0
  min_target_rms_db: -50.0
  min_target_active_ratio: 0.05
  target_active_threshold: 1e-4
  max_clip_resample_attempts: 30

target_instrument: "bass"

supported_instruments:
  - bass
  - drums
  - piano
  - guitar
  - strings
  - other

context_mode: "mixture_minus_target"

overfit_n_clips: 8
train_n_clips: 2000
val_n_clips: 240
