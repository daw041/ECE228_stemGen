# Training configuration for StemGen reproduction
training:
  batch_size: 4
  num_workers: 0
  num_epochs: 200
  learning_rate: 3e-4
  weight_decay: 1e-5
  use_amp: true
  gradient_accumulation_steps: 1
  warmup_steps: 500

  # Masking
  mask_ratio: 0.75       # used when mask_ratio_min/max are omitted
  mask_ratio_min: 0.50   # variable mask training reduces train/generate mismatch
  mask_ratio_max: 1.00
  mask_token_id: 1024    # using vocab_size as mask token
  codebook_weights: [1.0, 1.0]

  # Optimizer
  optimizer: "adamw"
  betas: [0.9, 0.999]

  # Checkpointing
  save_every_n_epochs: 10
  checkpoint_dir: "outputs/audio_token/e5_2cb/checkpoints"

  # Logging
  log_every_n_steps: 50
