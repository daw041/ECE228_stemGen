# H100 training configuration for the 1000-track fixed-stride token cache.
training:
  batch_size: 64
  num_workers: 2
  num_epochs: 120
  learning_rate: 3e-4
  weight_decay: 1e-5
  warmup_steps: 500
  use_amp: true
  gradient_accumulation_steps: 1

  mask_ratio: 0.75
  mask_ratio_min: 0.50
  mask_ratio_max: 1.00
  mask_token_id: 1024
  codebook_weights: [1.0, 1.0]

  optimizer: "adamw"
  betas: [0.9, 0.999]

  save_every_n_epochs: 5
  early_stopping_patience: 12
  early_stopping_min_delta: 0.005

  checkpoint_dir: "outputs/audio_token/runpod_e5_2cb_1000_stride_cached_h100/checkpoints"
  tensorboard_dir: "outputs/audio_token/runpod_e5_2cb_1000_stride_cached_h100/tensorboard"

  log_every_n_steps: 25
