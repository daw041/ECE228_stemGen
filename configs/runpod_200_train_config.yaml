# RunPod 200-track E5 training configuration.
training:
  # L40S/H100-class GPUs should handle this setup comfortably for 10s clips.
  batch_size: 8
  num_workers: 2
  num_epochs: 200
  learning_rate: 3e-4
  weight_decay: 1e-5
  warmup_steps: 500
  use_amp: true
  gradient_accumulation_steps: 1

  mask_ratio: 0.75
  mask_ratio_min: 0.50
  mask_ratio_max: 1.00
  mask_token_id: 1024
  codebook_weights: [1.0, 1.0]

  optimizer: "adamw"
  betas: [0.9, 0.999]

  save_every_n_epochs: 10
  early_stopping_patience: 20
  early_stopping_min_delta: 0.005

  checkpoint_dir: "outputs/audio_token/runpod_e5_2cb_200/checkpoints"
  tensorboard_dir: "outputs/audio_token/runpod_e5_2cb_200/tensorboard"

  log_every_n_steps: 50
