  <h1>Slide 3 — Results &amp; Insights</h1>
  <div class="chart-wrap">
  <svg width="780" height="360" viewBox="0 0 780 360" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bGray" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#475569"/>
        <stop offset="100%" stop-color="#334155"/>
      </linearGradient>
      <linearGradient id="bBlue" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#1d4ed8"/>
      </linearGradient>
      <linearGradient id="bGreen" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4ade80"/>
        <stop offset="100%" stop-color="#16a34a"/>
      </linearGradient>
      <linearGradient id="bRed" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f87171"/>
        <stop offset="100%" stop-color="#dc2626"/>
      </linearGradient>
    </defs>
    <rect width="780" height="360" rx="16" fill="#131722"/>

    <!-- title -->
    <text x="390" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Validation Accuracy vs. Experiment Config</text>

    <!-- Y axis -->
    <line x1="90" y1="50" x2="90" y2="270" stroke="#334155" stroke-width="1.5"/>
    <!-- Y gridlines + labels -->
    <!-- 0% -->
    <line x1="90" y1="270" x2="720" y2="270" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="78" y="274" text-anchor="end" fill="#64748b" font-size="11">0%</text>
    <!-- 20% -->
    <line x1="90" y1="226" x2="720" y2="226" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="78" y="230" text-anchor="end" fill="#64748b" font-size="11">20%</text>
    <!-- 40% -->
    <line x1="90" y1="182" x2="720" y2="182" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="78" y="186" text-anchor="end" fill="#64748b" font-size="11">40%</text>
    <!-- 60% -->
    <line x1="90" y1="138" x2="720" y2="138" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="78" y="142" text-anchor="end" fill="#64748b" font-size="11">60%</text>

    <!-- Y axis label -->
    <text x="18" y="180" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600"
          transform="rotate(-90,18,180)">Val Accuracy</text>

    <!-- X axis -->
    <line x1="90" y1="270" x2="720" y2="270" stroke="#334155" stroke-width="1.5"/>

    <!-- ─── BAR DATA ───
         Scale: 220px = 100%  → 1% = 2.2px
         bar top y = 270 − val*2.2
    -->

    <!-- Bar 1: 1cb baseline 315t → 28.0% → height=61.6 -->
    <rect x="130" y="208" width="80" height="62" rx="5" fill="url(#bGray)"/>
    <text x="170" y="204" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">28.0%</text>
    <text x="170" y="295" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">1cb</text>
    <text x="170" y="308" text-anchor="middle" fill="#64748b" font-size="9">315 tracks</text>
    <text x="170" y="320" text-anchor="middle" fill="#64748b" font-size="9">baseline</text>

    <!-- Bar 2: 2cb 200t → 29.4% → height=64.7 -->
    <rect x="258" y="205" width="80" height="65" rx="5" fill="url(#bBlue)"/>
    <text x="298" y="201" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">29.4%</text>
    <text x="298" y="295" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">2cb</text>
    <text x="298" y="308" text-anchor="middle" fill="#64748b" font-size="9">200 tracks</text>
    <text x="298" y="320" text-anchor="middle" fill="#64748b" font-size="9">E1</text>

    <!-- Bar 3: 2cb 550t → 51.8% → height=113.96  ← BEST, green + star -->
    <rect x="386" y="156" width="80" height="114" rx="5" fill="url(#bGreen)"/>
    <!-- glow outline -->
    <rect x="384" y="154" width="84" height="118" rx="6" fill="none" stroke="#4ade80" stroke-width="2.5" opacity="0.6"/>
    <text x="426" y="150" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="800">51.8%</text>
    <text x="426" y="139" text-anchor="middle" fill="#fbbf24" font-size="13">★ Best</text>
    <text x="426" y="295" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">2cb</text>
    <text x="426" y="308" text-anchor="middle" fill="#6ee7b7" font-size="9">550 tracks</text>
    <text x="426" y="320" text-anchor="middle" fill="#6ee7b7" font-size="9">E2</text>

    <!-- Bar 4: 4cb 150t → 16.8% → height=36.96, red (failed) -->
    <rect x="514" y="233" width="80" height="37" rx="5" fill="url(#bRed)"/>
    <text x="554" y="229" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">16.8%</text>
    <text x="554" y="295" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">4cb</text>
    <text x="554" y="308" text-anchor="middle" fill="#64748b" font-size="9">150 tracks</text>
    <text x="554" y="320" text-anchor="middle" fill="#f87171" font-size="9">E3 — insufficient data</text>

    <!-- ─── TAKEAWAY BOX ─── -->
    <rect x="90" y="336" width="590" height="16" rx="4" fill="#0f172a"/>
    <text x="385" y="348" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">
      Key Insight: More data (550 tracks) outweighs more codebooks (4cb) — data scale matters most at this stage.
    </text>

    <!-- ─── ANNOTATION: 2x data arrow ─── -->
    <!-- arrow from bar2 top to bar3 top -->
    <line x1="338" y1="185" x2="386" y2="165" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"
          marker-end="url(#a2)"/>
    <text x="353" y="173" text-anchor="middle" fill="#fbbf24" font-size="9">+22.4pp</text>
    <text x="353" y="184" text-anchor="middle" fill="#fbbf24" font-size="9">2.75× data</text>

    <!-- annotation: 4cb failed -->
    <line x1="594" y1="233" x2="640" y2="215" stroke="#f87171" stroke-width="1.2" stroke-dasharray="3,3"/>
    <text x="645" y="211" fill="#fca5a5" font-size="9">needs &gt;550 tracks</text>
    <text x="645" y="222" fill="#fca5a5" font-size="9">to generalize</text>
  </svg>
  </div>
</div>

</body>
</html>
